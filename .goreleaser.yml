# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2

gomod:
  proxy: true

report_sizes: true

metadata:
  mod_timestamp: '{{ .CommitTimestamp }}'

builds:
  - targets:
      - go_first_class
    flags:
      - -trimpath
    env:
      - CGO_ENABLED=0
    mod_timestamp: '{{ .CommitTimestamp }}'

universal_binaries:
  - replace: false

checksum:
  name_template: checksums.txt

changelog:
  disable: true

archives:
  - name_template: >-
      {{ .ProjectName }}_{{ .Version }}_
      {{- if eq .Os "darwin" }}MacOS{{- else }}{{- title .Os }}{{ end }}_
      {{- if eq .Arch "amd64" }}x86_64
        {{- else if eq .Arch "386" }}i386
        {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    format_overrides:
      - goos: windows
        formats: [zip]
    builds_info:
      group: root
      owner: root
      mtime: '{{ .CommitDate }}'
    files:
      - README.md
      - LICENSE

nfpms:
  - id: packages
    file_name_template: '{{ .ConventionalFileName }}'
    homepage: https://kubri.dev/
    description: >-
      Kubri signs and releases software for common package managers and
      software update frameworks.
    maintainer: Adam Bouqdib <adam@abemedia.co.uk>
    license: MIT
    vendor: Kubri
    section: utils
    formats:
      - apk
      - deb
      - rpm
      - archlinux
    mtime: '{{ .CommitDate }}'
    contents:
      - src: build/linux/kubri.gpg
        dst: /usr/share/keyrings/kubri.gpg
        packager: deb
      - src: build/linux/kubri.list
        dst: /etc/apt/sources.list.d/kubri.list
        packager: deb
      - src: build/linux/kubri.repo
        dst: /etc/yum.repos.d/kubri.repo
        packager: rpm
      - src: LICENSE
        dst: /usr/share/doc/kubri/copyright

snapcrafts:
  - name_template: '{{ .ProjectName }}_{{ .Arch }}{{ if .Arm }}v{{ .Arm }}{{ end }}'
    summary: Distribute auto-updating software with ease
    description: >-
      Kubri signs and releases software for common package managers and
      software update frameworks.
    grade: stable
    confinement: classic
    publish: true
    disable: true # TODO: enable

homebrew_casks:
  - repository:
      owner: kubri
      name: homebrew-tap
    homepage: https://kubri.dev/
    description: >-
      Kubri signs and releases software for common package managers and
      software update frameworks.
    license: MIT
    conflicts:
      - formula: kubri
    url:
      verified: github.com/kubri/kubri/
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/kubri"]
          end

winget:
  - name: Kubri
    publisher: Kubri
    short_description: Distribute auto-updating software with ease
    description: >-
      Kubri signs and releases software for common package managers and
      software update frameworks.
    license: MIT
    homepage: https://kubri.dev/
    publisher_url: https://kubri.dev/
    publisher_support_url: https://github.com/kubri/kubri/issues
    release_notes_url: https://github.com/kubri/kubri/releases/tag/{{.Tag}}
    tags:
      - release
      - update
      - devops
      - tool
      - repository
      - apt
      - yum
      - apk
      - sparkle
      - appinstaller
    repository:
      owner: kubri
      name: winget-pkgs
      branch: kubri-{{.Version}}
      token: '{{ .Env.PERSONAL_ACCESS_TOKEN }}'
      pull_request:
        enabled: true
        base:
          owner: microsoft
          name: winget-pkgs
          branch: master

scoops:
  - repository:
      owner: kubri
      name: scoop-bucket
    directory: bucket
    homepage: https://kubri.dev/
    description: Distribute auto-updating software with ease
    license: MIT

dockers_v2:
  - images:
      - kubri/kubri
      - ghcr.io/kubri/kubri
    tags:
      - 'v{{ .Version }}'
      - '{{ if not .Prerelease }}v{{ .Major }}.{{ .Minor }}{{ end }}'
      # - '{{ if not .Prerelease }}v{{ .Major }}{{ end }}' # TODO: enable once we hit v1
      - '{{ if not .Prerelease }}latest{{ end }}'
    dockerfile: build/docker/Dockerfile
    labels:
      org.opencontainers.image.title: '{{ .ProjectName }}'
      org.opencontainers.image.description: Distribute auto-updating software with ease
      org.opencontainers.image.vendor: Kubri
      org.opencontainers.image.source: '{{ .GitURL }}'
      org.opencontainers.image.url: '{{ .GitURL }}'
      org.opencontainers.image.documentation: https://kubri.dev/
      org.opencontainers.image.created: '{{ .Date }}'
      org.opencontainers.image.revision: '{{ .FullCommit }}'
      org.opencontainers.image.version: '{{ .Version }}'
      org.opencontainers.image.licenses: MIT
      org.opencontainers.image.authors: Adam Bouqdib <adam@abemedia.co.uk>
    annotations:
      org.opencontainers.image.description: Distribute auto-updating software with ease
      org.opencontainers.image.source: '{{ .GitURL }}'

sboms:
  - artifacts: archive

signs:
  - cmd: cosign
    signature: ${artifact}.sigstore.json
    output: '{{ not (isEnvSet "CI" )}}'
    artifacts: checksum
    args:
      - sign-blob
      - --bundle=${signature}
      - ${artifact}
      - --yes

docker_signs:
  - cmd: cosign
    artifacts: manifests
    output: '{{ not (isEnvSet "CI" )}}'
    args:
      - sign
      - ${artifact}@${digest}
      - --yes
